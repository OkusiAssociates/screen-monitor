# screen-monitor configuration
# Installed to /etc/screen-monitor.conf

# Seconds between capture attempts
CAPTURE_INTERVAL=10

# Screenshot storage directory
SCREENSHOT_DIR=/var/lib/screen-monitor/screenshots

# SQLite database path
DB_PATH=/var/lib/screen-monitor/screen-monitor.db

# Storage format: png, jpg, webp
CAPTURE_FORMAT=webp

# Compression quality (1-100, ignored for png)
CAPTURE_QUALITY=50

# Pixels to exclude from top of screen for change detection (0=disabled)
# Useful to ignore panel clock/tray that changes without user action
HASH_EXCLUDE_TOP=30

# Cleanup: delete screenshots older than this (days)
MAX_AGE_DAYS=30

# Cleanup: soft disk usage limit (MB)
MAX_DISK_MB=5000

# Sync: push screenshots to Okusi server via rclone (WebDAV)
# Requires: apt install rclone && rclone config (create a 'webdav' remote)
# Server side: Apache WebDAV endpoint on an Okusi server
SYNC_ENABLED=0
SYNC_REMOTE=''            # rclone remote name (e.g., 'okusi-sync')
SYNC_PATH=''              # Remote path (e.g., 'myhost' — becomes <remote>:myhost/)

#fin
